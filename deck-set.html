<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zaney Tarot Generated Card Set</title>
    <style>
      body {
        margin: 0;
        background: #070a12;
        color: #fff2d2;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      h1 {
        margin: 0 0 8px;
        color: #f3c766;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1;
      }

      p {
        margin: 0 0 28px;
        color: #b8c7d0;
        line-height: 1.5;
      }

      section {
        margin-top: 28px;
      }

      h2 {
        margin: 0 0 12px;
        color: #f3c766;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.35rem;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid rgba(243, 199, 102, 0.34);
        border-radius: 8px;
        background: #05070d;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Zaney Tarot Card Set</h1>
      <p>Generated anime tarot card sheets for the 62 cards currently used by the app.</p>

      <section>
        <h2>Major Arcana 0-VIII</h2>
        <img src="assets/card-sheets/major-00-08.png" alt="Major Arcana cards 0 through 8" />
      </section>
      <section>
        <h2>Major Arcana IX-XVII</h2>
        <img src="assets/card-sheets/major-09-17.png" alt="Major Arcana cards 9 through 17" />
      </section>
      <section>
        <h2>Major Arcana XVIII-XXI</h2>
        <img src="assets/card-sheets/major-18-21.png" alt="Major Arcana cards 18 through 21" />
      </section>
      <section>
        <h2>Wands</h2>
        <img src="assets/card-sheets/wands-ace-10.png" alt="Wands suit cards ace through ten" />
      </section>
      <section>
        <h2>Cups</h2>
        <img src="assets/card-sheets/cups-ace-10.png" alt="Cups suit cards ace through ten" />
      </section>
      <section>
        <h2>Swords</h2>
        <img src="assets/card-sheets/swords-ace-10.png" alt="Swords suit cards ace through ten" />
      </section>
      <section>
        <h2>Pentacles</h2>
        <img src="assets/card-sheets/pentacles-ace-10.png" alt="Pentacles suit cards ace through ten" />
      </section>
    </main>
  </body>
</html>
